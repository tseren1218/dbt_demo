
<div id="erd" style="padding: 1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  REGION ||--o{ NATION : "has"
  NATION ||--o{ SUPPLIER : "based in"
  NATION ||--o{ CUSTOMER : "based in"
  SUPPLIER ||--o{ PARTSUPP : "supplies"
  PART ||--o{ PARTSUPP : "has supplier"
  CUSTOMER ||--o{ ORDERS : "places"
  ORDERS ||--o{ LINEITEM : "contains"
  PARTSUPP ||--o{ LINEITEM : "fulfills"

  REGION {
    int r_regionkey PK
    varchar r_name
    varchar r_comment
  }
  NATION {
    int n_nationkey PK
    varchar n_name
    int n_regionkey FK
    varchar n_comment
  }
  SUPPLIER {
    int s_suppkey PK
    varchar s_name
    varchar s_address
    int s_nationkey FK
    varchar s_phone
    decimal s_acctbal
  }
  CUSTOMER {
    int c_custkey PK
    varchar c_name
    varchar c_address
    int c_nationkey FK
    varchar c_phone
    decimal c_acctbal
    varchar c_mktsegment
  }
  PART {
    int p_partkey PK
    varchar p_name
    varchar p_mfgr
    varchar p_brand
    varchar p_type
    int p_size
    varchar p_container
    decimal p_retailprice
  }
  PARTSUPP {
    int ps_partkey PK,FK
    int ps_suppkey PK,FK
    int ps_availqty
    decimal ps_supplycost
  }
  ORDERS {
    int o_orderkey PK
    int o_custkey FK
    char o_orderstatus
    decimal o_totalprice
    date o_orderdate
    varchar o_orderpriority
    varchar o_shippriority
  }
  LINEITEM {
    int l_orderkey PK,FK
    int l_partkey FK
    int l_suppkey FK
    int l_linenumber PK
    decimal l_quantity
    decimal l_extendedprice
    decimal l_discount
    decimal l_tax
    date l_shipdate
    date l_commitdate
    date l_receiptdate
    varchar l_shipmode
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
