
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'tpch_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'tpch_dbt'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Module 11 — Hooks & Operations.
# on-run-start / on-run-end fire once at the beginning/end of every dbt
# invocation (run, build, test...). Great for audit logging or setup SQL.
on-run-start:
  - "{{ log('🚀 Starting dbt run against target: ' ~ target.name, info=true) }}"
on-run-end:
  - "{{ log('✅ Finished dbt run — ' ~ (results | length) ~ ' nodes executed.', info=true) }}"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  tpch_dbt:
    stg:
      +schema: stg
      +materialized: view
      +group: staging          # Module 6.4 — ownership
      # Module 6.2 — access levels: private = same-group only, protected =
      # any model in THIS project (the default), public = other projects too.
      # staging/int are 'protected' so marts can ref() them; 'private' would
      # block those cross-group refs.
      +access: protected
    int:
      +schema: int
      +materialized: ephemeral
      +group: staging
      +access: protected
    marts:
      +schema: marts
      +materialized: table
      +group: finance          # Module 6.4 — owned by Analytics Engineering
      +access: public          # Module 6.2 — marts are the public interface
